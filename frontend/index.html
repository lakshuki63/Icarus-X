<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ICARUS-X | Space Weather Monitoring</title>
<meta name="description" content="Advanced space weather forecasting and GIC risk assessment system"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<script>
tailwind.config={theme:{extend:{fontFamily:{sans:['Outfit','sans-serif'],mono:['JetBrains Mono','monospace']},colors:{
  space:{950:'#020617',900:'#0f172a',800:'#1e293b',700:'#334155'},
  solar:{500:'#f59e0b',400:'#fbbf24',600:'#d97706'},
  plasma:{500:'#8b5cf6',400:'#a78bfa',600:'#7c3aed'},
  danger:{500:'#ef4444',400:'#f87171',600:'#dc2626'},
  safe:{500:'#10b981',400:'#34d399'}
}}}}
</script>
<style>
body{margin:0;background:#020617;color:#f8fafc;font-family:'Outfit',sans-serif;overflow-x:hidden}
.bg-mesh{background-image:radial-gradient(at 0% 0%,rgba(139,92,246,0.15) 0,transparent 50%),radial-gradient(at 50% 0%,rgba(245,158,11,0.1) 0,transparent 50%),radial-gradient(at 100% 0%,rgba(239,68,68,0.1) 0,transparent 50%);background-attachment:fixed}
.glass{background:rgba(15,23,42,0.6);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.05);box-shadow:0 8px 32px 0 rgba(0,0,0,0.37)}
.glass-heavy{background:rgba(15,23,42,0.85);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1)}
.glow-text-purple{text-shadow:0 0 10px rgba(139,92,246,0.5)}
.glow-text-amber{text-shadow:0 0 10px rgba(245,158,11,0.5)}
.glow-text-red{text-shadow:0 0 10px rgba(239,68,68,0.5)}
@keyframes scan-v{0%{top:-10%}100%{top:110%}}
.scanner-line{position:absolute;width:100%;height:2px;background:linear-gradient(90deg,transparent,rgba(139,92,246,0.5),transparent);box-shadow:0 0 15px rgba(139,92,246,0.8);animation:scan-v 3s linear infinite;z-index:10}
@keyframes rotate-slow{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.rotate-slow{animation:rotate-slow 20s linear infinite}
.stat-card:hover{border-color:rgba(139,92,246,0.3);transform:translateY(-2px);transition:all 0.3s ease}
::-webkit-scrollbar{width:8px}::-webkit-scrollbar-track{background:#020617}::-webkit-scrollbar-thumb{background:#1e293b;border-radius:4px}
</style>
</head>
<body class="bg-mesh">
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;
const {ResponsiveContainer,AreaChart,Area,XAxis,YAxis,Tooltip,CartesianGrid,ReferenceLine,RadarChart,PolarGrid,PolarAngleAxis,Radar}=window.Recharts;

const WS_URL=`ws://${window.location.hostname}:8000/ws/live`;
const API_URL=`http://${window.location.hostname}:8000`;
const RISK_COLORS={LOW:'#10b981',MEDIUM:'#f59e0b',HIGH:'#f97316',CRITICAL:'#ef4444'};

function useWebSocket(){
  const [data,setData]=useState(null);
  const [connected,setConnected]=useState(false);
  const wsRef=useRef(null);
  const connect=useCallback(()=>{
    const ws=new WebSocket(WS_URL);
    ws.onopen=()=>setConnected(true);
    ws.onmessage=(e)=>{
      const parsed=JSON.parse(e.data);
      if(parsed.type!=='keepalive')setData(parsed);
    };
    ws.onclose=()=>setTimeout(connect,2000);
    wsRef.current=ws;
  },[]);
  useEffect(()=>{connect();return()=>wsRef.current?.close();},[connect]);
  return{data,connected};
}

const CustomTooltip=({active,payload,label})=>{
  if(active&&payload&&payload.length){
    return(
      <div class="glass p-3 rounded-lg border border-white/10 text-xs font-mono">
        <div class="text-gray-400 mb-1">{label}</div>
        <div class="text-purple-400 font-bold">Kp Index: {payload[0].value.toFixed(1)}</div>
      </div>
    );
  }
  return null;
};

function MagnetogramPanel({m1Output,isReal}){
  return(
    <div class="glass rounded-3xl p-6 h-full relative overflow-hidden group">
      <div class="flex justify-between items-start mb-6">
        <div>
          <h3 class="text-[10px] font-black tracking-[0.2em] text-gray-400 uppercase mb-1">M1 Visionary System</h3>
          <h2 class="text-lg font-bold">Magnetogram Analysis</h2>
        </div>
        <div class={`px-3 py-1 rounded-full text-[10px] font-bold border ${isReal?'bg-safe-500/10 border-safe-500/30 text-safe-400':'bg-amber-500/10 border-amber-500/30 text-amber-400'}`}>
          {isReal?'YOLOv10 ACTIVE':'PROXY MODE'}
        </div>
      </div>
      <div class="relative rounded-2xl overflow-hidden aspect-square border border-white/5 bg-black/40">
        <img src="/static/magnetogram.png" class="w-full h-full object-cover opacity-60 group-hover:opacity-80 transition-opacity duration-700" alt="SDO Magnetogram"/>
        <div class="scanner-line"></div>
        <div class="absolute inset-0 pointer-events-none border-[20px] border-black/20"></div>
        <div class="absolute bottom-4 left-4 glass p-2 rounded-lg text-[10px] font-mono">
          <div class="text-gray-400">Target: NOAA AR 12673</div>
          <div class="text-purple-400">Regions Detected: {m1Output?.n_regions_detected||0}</div>
        </div>
      </div>
      <div class="grid grid-cols-3 gap-2 mt-4">
        {[0,1,2].map(i=>(
          <div key={i} class="bg-white/5 p-2 rounded-xl text-center">
            <div class="text-[9px] text-gray-500 uppercase">F{i}</div>
            <div class="text-xs font-mono font-bold text-gray-300">{m1Output?.[`f${i}`]?.toFixed(2)||'0.00'}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function FlarePanel({flare}){
  const prob=flare?.flare_probability||0;
  const pct=Math.round(prob*100);
  const color=prob > 0.7 ? RISK_COLORS.CRITICAL : prob > 0.4 ? RISK_COLORS.MEDIUM : RISK_COLORS.LOW;
  return(
    <div class="glass rounded-3xl p-6 h-full relative overflow-hidden">
      <h3 class="text-[10px] font-black tracking-[0.2em] text-gray-400 uppercase mb-4">M3 Flare Classifier</h3>
      <div class="flex flex-col items-center justify-center py-4">
        <div class="relative w-40 h-40">
          <svg class="w-full h-full transform -rotate-90">
            <circle cx="80" cy="80" r="70" stroke="currentColor" stroke-width="8" fill="transparent" class="text-white/5"/>
            <circle cx="80" cy="80" r="70" stroke="currentColor" stroke-width="8" fill="transparent" stroke-dasharray="440" stroke-dashoffset={440-(440*prob)} class="transition-all duration-1000" style={{color}}/>
          </svg>
          <div class="absolute inset-0 flex flex-col items-center justify-center">
            <div class="text-4xl font-black" style={{color}}>{pct}%</div>
            <div class="text-[10px] text-gray-500 uppercase tracking-widest font-bold">Probability</div>
          </div>
        </div>
        <div class="mt-6 text-center">
          <div class="text-xl font-bold uppercase tracking-widest mb-1" style={{color}}>{flare?.predicted_tier||'QUIET'}</div>
          <div class="text-[10px] text-gray-500 font-mono">Confidence: {flare?.confidence||'LOW'}</div>
        </div>
      </div>
      <div class="mt-4 space-y-2">
        {flare?.top_features?.slice(0,2).map((f,i)=>(
          <div key={i} class="flex justify-between items-center text-[10px]">
            <span class="text-gray-500 truncate mr-2">{f.name}</span>
            <span class="text-purple-400 font-mono">{(f.shap_value||0).toFixed(3)}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function GICPanel({alert}){
  const level=alert?.alert_level||'LOW';
  const color=RISK_COLORS[level];
  return(
    <div class="glass rounded-3xl p-6 relative overflow-hidden border-l-4" style={{borderColor:color}}>
      <h3 class="text-[10px] font-black tracking-[0.2em] text-gray-400 uppercase mb-4">M4 GIC Risk Engine</h3>
      <div class="flex items-center gap-6">
        <div>
          <div class="text-5xl font-black mb-1 glow-text-red" style={{color}}>{level}</div>
          <div class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Global Risk Level</div>
        </div>
        <div class="h-16 w-px bg-white/10"></div>
        <div class="flex-1 grid grid-cols-2 gap-4">
          <div>
            <div class="text-2xl font-black text-gray-100">{alert?.peak_gic_estimate?.toFixed(1)||'0.0'}</div>
            <div class="text-[9px] text-gray-500 uppercase font-bold">Peak GIC (A/km)</div>
          </div>
          <div>
            <div class="text-2xl font-black text-purple-400">+{alert?.peak_horizon_hr||0}h</div>
            <div class="text-[9px] text-gray-500 uppercase font-bold">Impact Window</div>
          </div>
        </div>
      </div>
      <div class="mt-6 p-3 bg-white/5 rounded-2xl text-[11px] text-gray-400 leading-relaxed italic border border-white/5">
        "{alert?.message||'No significant geomagnetic storm activity detected.'}"
      </div>
    </div>
  );
}

function StatsGrid({swLatest,dq}){
  const items=[
    {label:'Bz (IMF)',value:swLatest?.bz?.toFixed(1)||'0.0',unit:'nT',color:'text-blue-400'},
    {label:'Solar Velocity',value:swLatest?.vsw?.toFixed(0)||'400',unit:'km/s',color:'text-amber-400'},
    {label:'Plasma Density',value:swLatest?.np?.toFixed(1)||'5.0',unit:'p/cm³',color:'text-purple-400'},
    {label:'Data Quality',value:dq?.m1_real?'HEALTHY':'STUB',unit:'',color:dq?.m1_real?'text-safe-400':'text-solar-400'},
  ];
  return(
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
      {items.map((item,i)=>(
        <div key={i} class="glass rounded-2xl p-4 stat-card">
          <div class="text-[9px] font-black tracking-widest text-gray-500 uppercase mb-1">{item.label}</div>
          <div class="flex items-baseline gap-1">
            <div class={`text-2xl font-black font-mono ${item.color}`}>{item.value}</div>
            <div class="text-[10px] text-gray-600 font-bold">{item.unit}</div>
          </div>
        </div>
      ))}
    </div>
  );
}

function KpForecastChart({horizons}){
  const data=horizons?.map(h=>({name:`+${h.horizon_hr}h`,kp:h.kp_predicted}))||[];
  return(
    <div class="glass rounded-3xl p-6 h-full min-h-[300px]">
      <div class="flex justify-between items-center mb-6">
        <div>
          <h3 class="text-[10px] font-black tracking-[0.2em] text-gray-400 uppercase mb-1">M2 Kp Predictor</h3>
          <h2 class="text-lg font-bold">24-Hour Geomagnetic Forecast</h2>
        </div>
        <div class="flex gap-2">
          <div class="flex items-center gap-1 text-[9px] text-gray-500"><div class="w-2 h-2 rounded-full bg-purple-500"></div> Predict</div>
        </div>
      </div>
      <div class="h-64">
        <ResponsiveContainer width="100%" height="100%">
          <AreaChart data={data}>
            <defs>
              <linearGradient id="colorKp" x1="0" y1="0" x2="0" y2="1">
                <stop offset="5%" stopColor="#8b5cf6" stopOpacity={0.3}/>
                <stop offset="95%" stopColor="#8b5cf6" stopOpacity={0}/>
              </linearGradient>
            </defs>
            <CartesianGrid strokeDasharray="3 3" stroke="#ffffff08" vertical={false}/>
            <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fill:'#64748b',fontSize:10,fontFamily:'JetBrains Mono'}}/>
            <YAxis axisLine={false} tickLine={false} tick={{fill:'#64748b',fontSize:10,fontFamily:'JetBrains Mono'}} domain={[0,9]}/>
            <Tooltip content={<CustomTooltip/>}/>
            <Area type="monotone" dataKey="kp" stroke="#a78bfa" strokeWidth={4} fillOpacity={1} fill="url(#colorKp)"/>
            <ReferenceLine y={5} stroke="#f59e0b" strokeDasharray="5 5"/>
            <ReferenceLine y={7} stroke="#ef4444" strokeDasharray="5 5"/>
          </AreaChart>
        </ResponsiveContainer>
      </div>
    </div>
  );
}

function App(){
  const{data,connected}=useWebSocket();
  const [time,setTime]=useState(new Date());
  useEffect(()=>{const t=setInterval(()=>setTime(new Date()),1000);return()=>clearInterval(t)},[]);

  const m1_real=data?.data_quality?.m1_real||false;
  const m1_features=data?.m1_features||{}; // Need to ensure M5 sends this

  return(
    <div class="min-h-screen p-4 md:p-8">
      <div class="max-w-7xl mx-auto">
        {/* Top Header */}
        <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-4 mb-8">
          <div>
            <div class="flex items-center gap-3 mb-2">
              <div class="w-8 h-8 bg-gradient-to-br from-purple-500 to-amber-500 rounded-xl flex items-center justify-center shadow-lg shadow-purple-500/20">
                <div class="w-4 h-4 bg-white rounded-full"></div>
              </div>
              <h1 class="text-3xl font-black tracking-tight glow-text-purple">ICARUS-X</h1>
            </div>
            <p class="text-sm text-gray-500 font-medium tracking-wide uppercase">Planetary Defense & Space Weather Operations</p>
          </div>
          <div class="text-left md:text-right">
            <div class="text-sm font-mono text-gray-400 mb-1">{time.toUTCString()}</div>
            <div class="flex items-center gap-2 justify-start md:justify-end">
              <div class={`w-2 h-2 rounded-full animate-pulse ${connected?'bg-safe-400 shadow-[0_0_10px_rgba(16,185,129,0.5)]':'bg-danger-500'}`}></div>
              <span class="text-[10px] font-black uppercase tracking-widest text-gray-500">{connected?'System Live':'Disconnected'}</span>
            </div>
          </div>
        </div>

        {/* Top Row Stats */}
        <div class="mb-8">
          <StatsGrid swLatest={data?.solar_wind_latest} dq={data?.data_quality}/>
        </div>

        {/* Main Grid */}
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
          <div class="lg:col-span-1"><MagnetogramPanel m1Output={data?.flare} isReal={m1_real}/></div>
          <div class="lg:col-span-2"><KpForecastChart horizons={data?.kp_forecast?.horizons}/></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
          <div class="lg:col-span-2"><GICPanel alert={data?.gic_risk?.headline_alert}/></div>
          <div class="lg:col-span-1"><FlarePanel flare={data?.flare}/></div>
        </div>

        {/* Footer */}
        <div class="mt-12 flex flex-col md:flex-row justify-between items-center py-6 border-t border-white/5 gap-4">
          <div class="text-[10px] font-bold text-gray-600 uppercase tracking-[0.3em]">Module 5 Architect v1.2 // Mission Critical Interface</div>
          <div class="flex gap-6 text-[10px] text-gray-500 font-mono">
            <span>SDO_DATA: OK</span>
            <span>DSCOVR: OK</span>
            <span>OMNI: OK</span>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
