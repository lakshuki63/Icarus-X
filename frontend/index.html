function useWebSocket(){
  const [data,setData]=useState(null);
  const [connected,setConnected]=useState(false);
  const wsRef=useRef(null);
  const connect=useCallback(()=>{
    const ws=new WebSocket(WS_URL);
    ws.onopen=()=>setConnected(true);
    ws.onmessage=(e)=>{
      const parsed=JSON.parse(e.data);
      if(parsed.type!=='keepalive')setData(parsed);
    };
    ws.onclose=()=>setTimeout(connect,2000);
    wsRef.current=ws;
  },[]);
  useEffect(()=>{connect();return()=>wsRef.current?.close();},[connect]);
  return{data,connected};
}

const CustomTooltip=({active,payload,label})=>{

        <div class="text-purple-400 font-bold">Kp Index: {payload[0].value.toFixed(1)}</div>

  }
  return null;
};

function FlarePanel({ flare, isReal }) {
  const prob = flare?.flare_probability || 0;
  const isHigh = prob > 0.5;

  const shapData = useMemo(() => {
    if(!flare?.shap_values) return [];
    const entries = Object.entries(flare.shap_values);
    entries.sort((a,b) => Math.abs(b[1]) - Math.abs(a[1]));
    const top3 = entries.slice(0, 3).map(([k, v]) => {
      const feat = M1_FEATURES.find(f => f.id === k);
      return {
        name: feat ? feat.name : k.toUpperCase(),
        value: v
      };
    });
    return top3.reverse(); // largest at top
  }, [flare]);

  return (
    <div class="glass rounded-3xl p-6 relative overflow-hidden group mb-6">
      <div class="flex justify-between items-start mb-4">
        <div>
          <h3 class="text-[10px] font-black tracking-[0.2em] text-gray-400 uppercase">M3 XGBoost</h3>
          <h2 class="text-xl font-bold text-gray-100">Flare Sentinel</h2>
        </div>
        <div class={`px-3 py-1 rounded-full text-[10px] font-bold border ${isReal?'bg-safe-500/10 border-safe-500/30 text-safe-400':'bg-amber-500/10 border-amber-500/30 text-amber-400'}`}>
          {isReal?'XGBOOST ACTIVE':'PROXY MODE'}
        </div>
      </div>
      
      <div class="mt-4 p-4 bg-white/5 rounded-2xl border border-white/5">
        <div class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2 text-center">M/X-Class Probability</div>
        <div class="flex flex-col items-center justify-center mb-4">
          <div class={`text-5xl font-black tracking-tighter ${isHigh ? 'text-amber-500 drop-shadow-[0_0_15px_rgba(245,158,11,0.5)]' : 'text-gray-300'}`}>
            {(prob * 100).toFixed(1)}%
          </div>
          <div class="w-full h-1.5 bg-black/50 rounded-full mt-4 overflow-hidden">
            <div class={`h-full ${isHigh ? 'bg-amber-500' : 'bg-safe-400'}`} style={{width: `${prob * 100}%`}}></div>
          </div>
        </div>

        {shapData.length > 0 && (
          <div class="mt-4 border-t border-white/5 pt-4">
            <div class="text-[9px] font-bold text-gray-500 uppercase tracking-widest mb-2 text-center">Top Model Drivers (SHAP)</div>
            <div class="h-24">
              <ResponsiveContainer width="100%" height="100%">
                <BarChart data={shapData} layout="vertical" margin={{top:0, right:0, left:0, bottom:0}}>
                  <XAxis type="number" hide />
                  <YAxis type="category" dataKey="name" axisLine={false} tickLine={false} tick={{fill:'#94a3b8', fontSize:9, fontFamily:'JetBrains Mono'}} width={80} />
                  <Tooltip cursor={{fill: 'rgba(255,255,255,0.05)'}} contentStyle={{backgroundColor:'rgba(15,23,42,0.9)', borderColor:'rgba(255,255,255,0.1)', fontSize:'10px'}} />
                  <Bar dataKey="value" radius={[0,4,4,0]}>
                    {shapData.map((entry, index) => (
                      <Cell key={`cell-${index}`} fill={entry.value > 0 ? '#ef4444' : '#3b82f6'} />
                    ))}
                  </Bar>
                </BarChart>
              </ResponsiveContainer>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function KpForecastChart({horizons}){
  const [data, setData] = useState([]);
  
  const downsampledAttn = useMemo(() => {
    const attn = horizons?.[0]?.attention_weights;
    if (!attn || !attn.length) return Array(24).fill(0);
    const bins = [];
    for(let i=0; i<24; i++){
      let sum=0;
      for(let j=0; j<60; j++) sum += attn[i*60 + j] || 0;
      bins.push(sum);
    }
    const max = Math.max(...bins) || 1;
    return bins.map(b => b/max);
  }, [horizons]);

  useEffect(() => {
    if(horizons) {
      const d = horizons.map(h => ({
        name: `+${h.horizon_hr}h`,
        kp: h.kp_predicted,
        low: h.kp_ci_low,
        high: h.kp_ci_high
      }));
      setData(d);
    }
  }, [horizons]);
  return(
    <div class="glass rounded-3xl p-6 h-full min-h-[300px]">
      <div class="flex justify-between items-center mb-6">
        <div>
          <h3 class="text-[10px] font-black tracking-[0.2em] text-gray-400 uppercase mb-1">M2 Kp Predictor</h3>
          <h2 class="text-lg font-bold">24-Hour Geomagnetic Forecast</h2>
        </div>
        <div class="flex gap-2">
          <div class="flex items-center gap-1 text-[9px] text-gray-500"><div class="w-2 h-2 rounded-full bg-purple-500"></div> Predict</div>
        </div>
      </div>
      <div class="h-64">
        <ResponsiveContainer width="100%" height="100%">
          <AreaChart data={data}>
            <defs>
              <linearGradient id="colorKp" x1="0" y1="0" x2="0" y2="1">
                <stop offset="5%" stopColor="#8b5cf6" stopOpacity={0.3}/>
                <stop offset="95%" stopColor="#8b5cf6" stopOpacity={0}/>
              </linearGradient>
            </defs>
            <CartesianGrid strokeDasharray="3 3" stroke="#ffffff08" vertical={false}/>
            <XAxis dataKey="name" stroke="#475569" fontSize={10} tickLine={false} axisLine={false}/>
            <YAxis domain={[0, 9]} stroke="#475569" fontSize={10} tickLine={false} axisLine={false} ticks={[0,3,5,7,9]}/>
            <Tooltip contentStyle={{backgroundColor:'rgba(15,23,42,0.9)', borderColor:'rgba(255,255,255,0.1)'}} itemStyle={{color:'#c084fc'}} />
            
            {/* G-Tier Reference Lines */}
            <ReferenceLine y={5} stroke="#eab308" strokeDasharray="3 3" strokeOpacity={0.5} label={{position:'insideTopLeft', value:'G1', fill:'#eab308', fontSize:9}}/>
            <ReferenceLine y={7} stroke="#f97316" strokeDasharray="3 3" strokeOpacity={0.5} label={{position:'insideTopLeft', value:'G3', fill:'#f97316', fontSize:9}}/>
            <ReferenceLine y={9} stroke="#ef4444" strokeDasharray="3 3" strokeOpacity={0.5} label={{position:'insideTopLeft', value:'G5', fill:'#ef4444', fontSize:9}}/>

            <Area type="monotone" dataKey="high" stroke="none" fill="#8b5cf6" fillOpacity={0.1} />
            <Area type="monotone" dataKey="low" stroke="none" fill="#0f172a" fillOpacity={1} />
            <Area type="monotone" dataKey="kp" stroke="#c084fc" fill="url(#colorKp)" strokeWidth={2}/>
          </AreaChart>
        </ResponsiveContainer>
      </div>

      {/* Attention Heatmap */}
      <div class="mt-4 border-t border-white/5 pt-4">
        <div class="flex justify-between items-end mb-2">
          <h4 class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Temporal Attention (T-24h to Now)</h4>
          <span class="text-[9px] text-gray-500 font-mono">BiGRU Feature Focus</span>
        </div>
        <div class="flex h-4 gap-[2px]">
          {downsampledAttn.map((val, i) => {
            return (
              <div 
                key={i} 
                class="flex-1 rounded-sm relative group/tt"
                style={{ backgroundColor: `rgba(239, 68, 68, ${0.1 + val * 0.9})` }}
              >
                <div class="absolute bottom-full mb-1 left-1/2 -translate-x-1/2 hidden group-hover/tt:block bg-black border border-white/10 text-white text-[9px] py-1 px-2 rounded font-mono whitespace-nowrap z-10">
                  T-{24-i}h: {(val*100).toFixed(0)}%
                </div>
              </div>
            );
          })}
        </div>
        <div class="flex justify-between mt-1 text-[8px] font-mono text-gray-500">
          <span>-24h</span>
          <span>-12h</span>
          <span>NOW</span>
        </div>
      </div>
    </div>
  );
}

function SolarWindChart({ mode, eventName }) {
  const [data, setData] = useState([]);
  
  useEffect(() => {
    const fetchHistory = async () => {
      try {
        const res = await fetch(`${API_URL}/api/solar-wind/history?hours=24`);
        const json = await res.json();
        const formatted = json.readings.map(r => {
          const d = new Date(r.timestamp);
          return {
            time: `${d.getHours().toString().padStart(2, '0')}:00`,
            bz: r.bz_gsm,
            vsw: r.speed
          };
        });
        setData(formatted);
      } catch (e) {
        console.error("Failed to fetch solar wind history", e);
      }
    };
    
    // Fetch immediately on mount or when mode/event changes
    fetchHistory();
    const t = setInterval(fetchHistory, 60000);
    return () => clearInterval(t);
  }, [mode, eventName]);

  return (
    <div class="glass rounded-3xl p-6 relative overflow-hidden mb-6 h-64">
      <h3 class="text-[10px] font-black tracking-[0.2em] text-gray-400 uppercase mb-4">24-Hour Solar Wind Telemetry</h3>
      <ResponsiveContainer width="100%" height="100%">
        <ComposedChart data={data}>
          <CartesianGrid strokeDasharray="3 3" stroke="#ffffff08" vertical={false} />
          <XAxis dataKey="time" tick={{fill:'#64748b',fontSize:10,fontFamily:'JetBrains Mono'}} axisLine={false} tickLine={false} />
          <YAxis yAxisId="left" domain={[-50, 20]} tick={{fill:'#ef4444',fontSize:10,fontFamily:'JetBrains Mono'}} axisLine={false} tickLine={false} />
          <YAxis yAxisId="right" orientation="right" domain={['dataMin', 'dataMax']} tick={{fill:'#f59e0b',fontSize:10,fontFamily:'JetBrains Mono'}} axisLine={false} tickLine={false} />
          <Tooltip contentStyle={{backgroundColor:'rgba(15,23,42,0.9)', borderColor:'rgba(255,255,255,0.1)'}} itemStyle={{fontFamily:'JetBrains Mono', fontSize:'12px'}} labelStyle={{color:'#94a3b8'}} />
          
          <ReferenceLine yAxisId="left" y={-5} stroke="#f97316" strokeDasharray="5 5" />
          <ReferenceLine yAxisId="left" y={-10} stroke="#dc2626" strokeDasharray="5 5" />
          
          <Line yAxisId="left" type="monotone" dataKey="bz" stroke="#ef4444" strokeWidth={2} dot={false} name="Bz (nT)" />
          <Line yAxisId="right" type="monotone" dataKey="vsw" stroke="#f59e0b" strokeWidth={2} dot={false} name="Velocity (km/s)" />
        </ComposedChart>
      </ResponsiveContainer>
    </div>
  );
}

function PipelineLogPanel({ logs, connected }) {
  const getModuleColor = (mod) => {
    switch(mod) {
      case 'M1': return 'text-purple-400 bg-purple-500/10 border-purple-500/30';
      case 'M2': return 'text-blue-400 bg-blue-500/10 border-blue-500/30';
      case 'M3': return 'text-amber-400 bg-amber-500/10 border-amber-500/30';
      case 'M4': return 'text-safe-400 bg-safe-500/10 border-safe-500/30';
      case 'M5': return 'text-gray-300 bg-gray-500/10 border-gray-500/30';
      case 'DATA': return 'text-cyan-400 bg-cyan-500/10 border-cyan-500/30';
      default: return 'text-gray-400 bg-gray-500/10 border-gray-500/30';
    }
  };

  const getStatusBadge = (status) => {
    switch(status) {
      case 'OK': return <span class="text-safe-400">🟢 OK</span>;
      case 'WARN': return <span class="text-amber-400">🟡 WARN</span>;
      case 'ERROR': return <span class="text-danger-500">🔴 ERROR</span>;
      case 'STUB': return <span class="text-gray-500">⚪ ⚠ STUB</span>;
      default: return <span>{status}</span>;
    }
  };

  return (
    <div class="glass rounded-3xl p-6 h-full relative overflow-hidden flex flex-col min-h-[300px]">
      <div class="flex justify-between items-center mb-4">
        <div>
          <h3 class="text-[10px] font-black tracking-[0.2em] text-gray-400 uppercase mb-1">System Audit</h3>
          <h2 class="text-lg font-bold">Live Pipeline Log</h2>
        </div>
        <div class="flex items-center gap-2">
          <div class={`w-2 h-2 rounded-full ${connected ? 'bg-safe-400 animate-pulse' : 'bg-danger-500'}`}></div>
          <span class="text-[10px] text-gray-500 font-mono uppercase">{connected ? 'Live' : 'Offline'}</span>
        </div>
      </div>
      
      <div class="flex-1 bg-black/60 rounded-xl p-4 overflow-y-auto font-mono text-[11px] border border-white/5">
        {(!logs || logs.length === 0) ? (
           <div class="text-gray-600 italic">Waiting for pipeline execution...</div>
        ) : (
          <table class="w-full text-left border-collapse">
            <tbody>
              {logs.map((log, i) => (
                <tr key={i} class="border-b border-white/5 hover:bg-white/5 transition-colors">
                  <td class="py-2 text-gray-500 whitespace-nowrap align-top pr-2">{log.timestamp}</td>
                  <td class="py-2 px-2 align-top">
                    <span class={`px-2 py-0.5 rounded border text-[9px] font-bold ${getModuleColor(log.module)}`}>
                      {log.module}
                    </span>
                  </td>
                  <td class="py-2 px-2 align-top whitespace-nowrap">{getStatusBadge(log.status)}</td>
                  <td class="py-2 px-2 text-gray-300 w-full">{log.detail}</td>
                  <td class="py-2 pl-2 text-right text-gray-500 whitespace-nowrap align-top">{log.duration_ms}ms</td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}

function ModelStatusPanel({ audit }) {
  if (!audit) return null;
  return (
    <div class="glass rounded-3xl p-6 relative overflow-hidden mb-6">
      <h3 class="text-[10px] font-black tracking-[0.2em] text-gray-400 uppercase mb-4">Pipeline Model Status</h3>
      <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4">
        {Object.entries(audit).map(([name, info], i) => {
          const isOk = info.status === 'OK';
          return (
            <div key={i} class="bg-white/5 border border-white/10 rounded-xl p-3 flex flex-col justify-between">
              <div>
                <div class="text-[10px] text-gray-500 font-black mb-2 uppercase">{name.replace(/_/g, ' ')}</div>
                <div class={`text-xs font-black mb-1 ${isOk ? 'text-safe-400' : 'text-danger-500'}`}>
                  {isOk ? '✅ LOADED' : `❌ ${info.status}`}
                </div>
              </div>
              <div class="mt-2">
                {info.size_mb && <div class="text-[9px] text-gray-400 font-mono">Size: {info.size_mb} MB</div>}
                {info.action && <div class="text-[9px] text-amber-500 font-mono font-bold mt-1">Action: {info.action}</div>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function StormHistoryPanel() {
  const [loading, setLoading] = useState(false);
  const storms = [
    { id: "sept_2017", name: "September 2017 X9.3 Storm", date: "Sep 6, 2017", kp: 8, alert: "CRITICAL", desc: "Largest flare of Solar Cycle 24. Kp reached 8 (G4). 40 Starlink satellites de-orbited in Feb 2022 storm." },
    { id: "halloween_2003", name: "Halloween Storms 2003", date: "Oct 28, 2003", kp: 9, alert: "CRITICAL", desc: "Kp = 9. Swedish power grid outage. 47,000 customers lost power." },
    { id: "carrington_1859", name: "Carrington Event 1859", date: "Sep 1, 1859", kp: 9, alert: "CRITICAL", desc: "Strongest storm in recorded history. Global telegraph lines caught fire." },
    { id: "quebec_1989", name: "Quebec Blackout 1989", date: "Mar 13, 1989", kp: 9, alert: "CRITICAL", desc: "Kp = 9. Quebec power grid failed. 6 million people lost power for 9 hours." }
  ];

  const handleReplay = async (id) => {
    setLoading(true);
    try {
      await fetch(`${API_URL}/api/replay/${id}`, { method: 'GET' });
    } catch(e) {
      console.error("Replay error", e);
    }
    setLoading(false);
  };

  return (
    <div class="glass rounded-3xl p-6 relative overflow-hidden mb-6">
      <h3 class="text-[10px] font-black tracking-[0.2em] text-gray-400 uppercase mb-4">Storm History & Model Performance</h3>
      <div class="space-y-4">
        {storms.map(storm => (
          <div key={storm.id} class="bg-white/5 border border-white/10 rounded-xl p-4 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div class="flex-1">
              <div class="flex items-center gap-3 mb-2">
                <span class="text-xl">⚡</span>
                <h4 class="text-sm font-bold text-gray-100 uppercase tracking-wide">{storm.name}</h4>
              </div>
              <div class="text-[10px] font-mono text-gray-400 mb-2">
                Date: {storm.date} | True Kp: {storm.kp} | True Alert: {storm.alert}
              </div>
              <p class="text-[11px] text-gray-500 italic">"{storm.desc}"</p>
            </div>
            <div>
              <button disabled={loading} onClick={() => handleReplay(storm.id)} class="px-4 py-2 bg-purple-500/20 hover:bg-purple-500/40 border border-purple-500/50 text-purple-400 text-[10px] font-bold uppercase tracking-widest rounded-lg transition-all whitespace-nowrap">
                {loading ? 'Replaying...' : '▶ Replay Storm'}
              </button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function DataFreshness({ data, time }) {
  const getStatus = (timestamp) => {
    if (data?.mode === 'REPLAY') return { text: 'REPLAY', color: 'text-amber-500', dot: 'bg-amber-500' };
    if (!timestamp) return { text: 'OFFLINE', color: 'text-danger-500', dot: 'bg-danger-500' };
    
    const diffMins = (time.getTime() - new Date(timestamp).getTime()) / 60000;
    
    // Fallbacks for simulated data times
    if (diffMins < 60) return { text: 'FRESH', color: 'text-safe-400', dot: 'bg-safe-400 animate-pulse' };
    return { text: 'ONLINE', color: 'text-cyan-400', dot: 'bg-cyan-400' };
  };

  const sdo = getStatus(data?.m1_features?.timestamp);
  const dscovr = getStatus(data?.solar_wind_latest?.timestamp);
  const omni = getStatus(data?.solar_wind_latest?.timestamp);

  const Item = ({ label, status }) => (
    <div class="flex items-center gap-2">
      <span class="text-gray-500 uppercase">{label}:</span>
      <div class="flex items-center gap-1">
        <div class={`w-1.5 h-1.5 rounded-full ${status.dot}`}></div>
        <span class={`font-bold ${status.color}`}>{status.text}</span>
      </div>
    </div>
  );

  return (
    <div class="flex flex-wrap gap-4 md:gap-6 text-[10px] font-mono bg-white/5 px-4 py-2 rounded-lg border border-white/5">
      <Item label="SDO_HMI" status={sdo} />
      <Item label="DSCOVR" status={dscovr} />
      <Item label="NOAA_KP" status={omni} />
    </div>
  );
}

function App(){
  const{data,connected}=useWebSocket();
  const [time,setTime]=useState(new Date());
  useEffect(()=>{const t=setInterval(()=>setTime(new Date()),1000);return()=>clearInterval(t)},[]);

  const m1_real=data?.data_quality?.m1_real||false;

  return(
    <div class="min-h-screen p-4 md:p-8">
      <div class="max-w-7xl mx-auto">
        {/* Top Header */}
        <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-4 mb-8">
          <div>
            <div class="flex items-center gap-3 mb-2">
              <div class="w-8 h-8 bg-gradient-to-br from-purple-500 to-amber-500 rounded-xl flex items-center justify-center shadow-lg shadow-purple-500/20">
                <div class="w-4 h-4 bg-white rounded-full"></div>
              </div>
              <h1 class="text-3xl font-black tracking-tight glow-text-purple">ICARUS-X</h1>
              {data?.mode === 'REPLAY' && <span class="px-2 py-1 bg-amber-500 text-black text-[10px] font-black rounded uppercase ml-2 animate-pulse">REPLAY MODE: {data.event_name}</span>}
            </div>
            <p class="text-sm text-gray-500 font-medium tracking-wide uppercase">Planetary Defense & Space Weather Operations</p>
          </div>
          <div class="text-left md:text-right">
            <div class="text-sm font-mono text-gray-400 mb-1">{time.toUTCString()}</div>
            <div class="flex items-center gap-2 justify-start md:justify-end">
              <div class={`w-2 h-2 rounded-full animate-pulse ${connected?'bg-safe-400 shadow-[0_0_10px_rgba(16,185,129,0.5)]':'bg-danger-500'}`}></div>
              <span class="text-[10px] font-black uppercase tracking-widest text-gray-500">{connected?'System Live':'Disconnected'}</span>
            </div>
          </div>
        </div>

        {/* Top Row Stats */}
        <div class="mb-8">
          <StatsGrid data={data} />
        </div>
        
        {/* Solar Wind Chart */}
        <SolarWindChart mode={data?.mode} eventName={data?.event_name} />

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
          <div class="lg:col-span-1"><MagnetogramPanel m1Output={data?.m1_features} isReal={m1_real} isReplay={data?.mode === 'REPLAY'}/></div>
          <div class="lg:col-span-2"><KpForecastChart horizons={data?.kp_forecast?.horizons}/></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
          <div class="lg:col-span-2"><GICPanel alert={data?.gic_risk?.headline_alert}/></div>
          <div class="lg:col-span-1"><FlarePanel flare={data?.flare} isReal={data?.data_quality?.m3_real||false}/></div>
        </div>

        <div class="mb-6">
          <PipelineLogPanel logs={data?.pipeline_log} connected={connected}/>
        </div>

        <ModelStatusPanel audit={data?.model_audit} />

        <StormHistoryPanel />

        {/* Footer */}
        <div class="mt-12 flex flex-col md:flex-row justify-between items-center py-6 border-t border-white/5 gap-4">
          <div class="text-[10px] font-bold text-gray-600 uppercase tracking-[0.3em]">Module 5 Architect v1.2 // Mission Critical Interface</div>
          <DataFreshness data={data} time={time} />
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
