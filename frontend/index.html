<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ICARUS-X | Space Weather Forecasting</title>
<meta name="description" content="Real-time space weather forecasting and GIC risk assessment system"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<script>
tailwind.config={theme:{extend:{fontFamily:{sans:['Inter'],mono:['JetBrains Mono']},colors:{
space:{950:'#030712',900:'#0a0f1e',800:'#111827',700:'#1e293b',600:'#334155'},
solar:{500:'#f59e0b',400:'#fbbf24',300:'#fcd34d'},
plasma:{500:'#8b5cf6',400:'#a78bfa'},
danger:{500:'#ef4444',400:'#f87171',600:'#dc2626'},
safe:{500:'#22c55e',400:'#4ade80'}
}}}}
</script>
<style>
body{margin:0;background:#030712;color:#e2e8f0;font-family:'Inter',sans-serif}
*{box-sizing:border-box}::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#111827}
::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
@keyframes pulse-glow{0%,100%{box-shadow:0 0 20px rgba(239,68,68,0.3)}50%{box-shadow:0 0 40px rgba(239,68,68,0.6)}}
@keyframes scan{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.alert-critical{animation:pulse-glow 2s ease-in-out infinite}
.glass{background:rgba(17,24,39,0.7);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08)}
.scan-line::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(90deg,transparent,rgba(139,92,246,0.05),transparent);animation:scan 3s ease-in-out infinite;pointer-events:none}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;
const {ResponsiveContainer,AreaChart,Area,XAxis,YAxis,Tooltip,CartesianGrid,BarChart,Bar,Cell,ReferenceLine}=Recharts;

const WS_URL='ws://localhost:8000/ws/live';
const API_URL='http://localhost:8000';
const RISK_COLORS={LOW:'#22c55e',MEDIUM:'#f59e0b',HIGH:'#f97316',CRITICAL:'#ef4444'};
const G_COLORS=['#22c55e','#84cc16','#eab308','#f97316','#ef4444'];

// ── WebSocket Hook ──────────────────────────────────────
function useWebSocket(){
  const [data,setData]=useState(null);
  const [connected,setConnected]=useState(false);
  const [history,setHistory]=useState([]);
  const wsRef=useRef(null);
  const reconnectRef=useRef(null);

  const connect=useCallback(()=>{
    try{
      const ws=new WebSocket(WS_URL);
      ws.onopen=()=>{setConnected(true);console.log('🔌 WebSocket connected')};
      ws.onmessage=(e)=>{
        try{
          const parsed=JSON.parse(e.data);
          if(parsed.type==='keepalive')return;
          setData(parsed);
          setHistory(h=>[...h.slice(-59),{...parsed,_receivedAt:new Date().toISOString()}]);
        }catch(err){console.error('Parse error:',err)}
      };
      ws.onclose=()=>{setConnected(false);reconnectRef.current=setTimeout(connect,3000)};
      ws.onerror=()=>{ws.close()};
      wsRef.current=ws;
    }catch(e){reconnectRef.current=setTimeout(connect,3000)}
  },[]);

  useEffect(()=>{
    connect();
    // Also fetch initial data via REST
    fetch(API_URL+'/api/forecast/latest').then(r=>r.json()).then(d=>{if(d.horizons)setData(d)}).catch(()=>{});
    return()=>{if(wsRef.current)wsRef.current.close();clearTimeout(reconnectRef.current)};
  },[connect]);

  return{data,connected,history};
}

// ── AlertBanner ─────────────────────────────────────────
function AlertBanner({alert,connected,isStub}){
  if(!alert)return null;
  const level=alert.alert_level||'LOW';
  const bgMap={LOW:'from-green-900/80 to-green-950/80',MEDIUM:'from-yellow-900/80 to-yellow-950/80',HIGH:'from-orange-900/80 to-orange-950/80',CRITICAL:'from-red-900/80 to-red-950/80'};
  const borderMap={LOW:'border-green-500/40',MEDIUM:'border-yellow-500/40',HIGH:'border-orange-500/40',CRITICAL:'border-red-500/40'};
  const isCrit=level==='CRITICAL'||level==='HIGH';

  return(
    <div id="alert-banner" className={`sticky top-0 z-50 bg-gradient-to-r ${bgMap[level]} border-b ${borderMap[level]} ${isCrit?'alert-critical':''}`}>
      <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
        <div className="flex items-center gap-3">
          <div className={`w-3 h-3 rounded-full ${connected?'bg-green-400':'bg-red-400'} animate-pulse`}/>
          <span className="font-bold text-sm tracking-wider">ICARUS-X</span>
          <span className="text-xs opacity-60">|</span>
          <span className="text-xs font-mono opacity-80">{isStub?'DEMO MODE':'LIVE'}</span>
        </div>
        <div className="flex items-center gap-3">
          <span className="text-sm font-medium">{alert.message||'System active'}</span>
          <span className={`px-2 py-0.5 rounded text-xs font-bold`} style={{background:RISK_COLORS[level],color:'#000'}}>{level}</span>
        </div>
      </div>
    </div>
  );
}

// ── GICPanel ────────────────────────────────────────────
function GICPanel({alert,gTierProbs}){
  if(!alert)return null;
  const level=alert.alert_level||'LOW';
  const color=RISK_COLORS[level];
  const tier=gTierProbs?.predicted_tier||'G0';

  return(
    <div id="gic-panel" className="glass rounded-2xl p-6 relative overflow-hidden scan-line">
      <h3 className="text-xs font-semibold tracking-widest text-gray-400 mb-4 uppercase">GIC Risk Assessment</h3>
      <div className="flex items-center gap-6">
        <div className="text-center">
          <div className="text-6xl font-black" style={{color}}>{level}</div>
          <div className="text-sm text-gray-400 mt-1">Current Risk Tier</div>
        </div>
        <div className="h-20 w-px bg-gray-700"/>
        <div className="flex-1 grid grid-cols-2 gap-3">
          <div className="text-center p-3 rounded-lg bg-space-900/50">
            <div className="text-2xl font-bold" style={{color}}>{alert.peak_gic_estimate?.toFixed(1)||'0.0'}</div>
            <div className="text-xs text-gray-500">Peak GIC (A/km)</div>
          </div>
          <div className="text-center p-3 rounded-lg bg-space-900/50">
            <div className="text-2xl font-bold text-purple-400">+{alert.peak_horizon_hr||0}h</div>
            <div className="text-xs text-gray-500">Peak Horizon</div>
          </div>
          <div className="text-center p-3 rounded-lg bg-space-900/50">
            <div className="text-2xl font-bold text-yellow-400">{tier}</div>
            <div className="text-xs text-gray-500">Storm Class</div>
          </div>
          <div className="text-center p-3 rounded-lg bg-space-900/50">
            <div className="text-2xl font-bold">{alert.should_email?'📧':'—'}{alert.should_sms?' 📱':''}</div>
            <div className="text-xs text-gray-500">Notifications</div>
          </div>
        </div>
      </div>
      {/* G-tier probability bar */}
      {gTierProbs&&(
        <div className="mt-4">
          <div className="flex gap-1 h-4 rounded-full overflow-hidden">
            {['g0','g1','g2','g3','g4'].map((g,i)=>{
              const p=(gTierProbs[g]||0)*100;
              return p>0?<div key={g} style={{width:`${p}%`,background:G_COLORS[i]}} className="transition-all duration-700" title={`G${i}: ${p.toFixed(1)}%`}/>:null;
            })}
          </div>
          <div className="flex justify-between mt-1">{['G0','G1','G2','G3','G4'].map((g,i)=>(
            <span key={g} className="text-[10px] font-mono" style={{color:G_COLORS[i]}}>{g} {((gTierProbs[g.toLowerCase()]||0)*100).toFixed(0)}%</span>
          ))}</div>
        </div>
      )}
    </div>
  );
}

// ── KpChart ─────────────────────────────────────────────
function KpChart({horizons,history}){
  const chartData=useMemo(()=>{
    if(!horizons)return[];
    return horizons.map(h=>({
      name:`+${h.horizon_hr}h`,
      kp:h.kp_predicted,
      ciLow:h.kp_ci_low,
      ciHigh:h.kp_ci_high,
      gic:h.gic_mean||0,
      risk:h.risk_tier||'LOW'
    }));
  },[horizons]);

  return(
    <div id="kp-chart" className="glass rounded-2xl p-6">
      <h3 className="text-xs font-semibold tracking-widest text-gray-400 mb-4 uppercase">Kp Index Forecast — 24 Hour Horizon</h3>
      <ResponsiveContainer width="100%" height={280}>
        <AreaChart data={chartData} margin={{top:5,right:20,bottom:5,left:0}}>
          <defs>
            <linearGradient id="kpGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="#8b5cf6" stopOpacity={0.4}/>
              <stop offset="100%" stopColor="#8b5cf6" stopOpacity={0}/>
            </linearGradient>
            <linearGradient id="ciGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="#6366f1" stopOpacity={0.15}/>
              <stop offset="100%" stopColor="#6366f1" stopOpacity={0.02}/>
            </linearGradient>
          </defs>
          <CartesianGrid strokeDasharray="3 3" stroke="#1e293b"/>
          <XAxis dataKey="name" stroke="#64748b" fontSize={12} fontFamily="JetBrains Mono"/>
          <YAxis domain={[0,9]} stroke="#64748b" fontSize={12} fontFamily="JetBrains Mono"/>
          <Tooltip contentStyle={{background:'#111827',border:'1px solid #334155',borderRadius:8,fontFamily:'JetBrains Mono',fontSize:12}} labelStyle={{color:'#94a3b8'}}/>
          <ReferenceLine y={5} stroke="#eab308" strokeDasharray="5 5" label={{value:'G1',fill:'#eab308',fontSize:10}}/>
          <ReferenceLine y={7} stroke="#f97316" strokeDasharray="5 5" label={{value:'G3',fill:'#f97316',fontSize:10}}/>
          <Area type="monotone" dataKey="ciHigh" stackId="ci" stroke="none" fill="url(#ciGrad)"/>
          <Area type="monotone" dataKey="ciLow" stackId="ci" stroke="none" fill="transparent"/>
          <Area type="monotone" dataKey="kp" stroke="#8b5cf6" strokeWidth={3} fill="url(#kpGrad)" dot={{r:5,fill:'#8b5cf6',stroke:'#1e1b4b',strokeWidth:2}}/>
        </AreaChart>
      </ResponsiveContainer>
    </div>
  );
}

// ── ForecastTable ───────────────────────────────────────
function ForecastTable({horizons}){
  if(!horizons||!horizons.length)return null;
  return(
    <div id="forecast-table" className="glass rounded-2xl p-6 overflow-x-auto">
      <h3 className="text-xs font-semibold tracking-widest text-gray-400 mb-4 uppercase">Multi-Horizon Forecast Detail</h3>
      <table className="w-full text-sm">
        <thead><tr className="border-b border-gray-700/50">
          {['Horizon','Kp','CI Range','σ','GIC (A/km)','GIC Range','Risk','Worst Case'].map(h=>(
            <th key={h} className="py-2 px-3 text-left text-xs text-gray-500 font-medium">{h}</th>
          ))}
        </tr></thead>
        <tbody>{horizons.map((h,i)=>{
          const color=RISK_COLORS[h.risk_tier]||'#22c55e';
          return(
            <tr key={i} className="border-b border-gray-800/30 hover:bg-white/[0.02] transition-colors">
              <td className="py-2.5 px-3 font-mono font-bold text-purple-400">+{h.horizon_hr}h</td>
              <td className="py-2.5 px-3 font-mono font-bold" style={{color}}>{h.kp_predicted?.toFixed(1)}</td>
              <td className="py-2.5 px-3 font-mono text-gray-400 text-xs">{h.kp_ci_low?.toFixed(1)} – {h.kp_ci_high?.toFixed(1)}</td>
              <td className="py-2.5 px-3 font-mono text-gray-500 text-xs">±{(h.kp_std||(h.kp_ci_high-h.kp_ci_low)/3)?.toFixed(2)}</td>
              <td className="py-2.5 px-3 font-mono font-semibold" style={{color}}>{h.gic_mean?.toFixed(1)}</td>
              <td className="py-2.5 px-3 font-mono text-gray-400 text-xs">{h.gic_p5?.toFixed(1)} – {h.gic_p95?.toFixed(1)}</td>
              <td className="py-2.5 px-3"><span className="px-2 py-0.5 rounded text-xs font-bold" style={{background:color+'20',color}}>{h.risk_tier}</span></td>
              <td className="py-2.5 px-3 text-xs" style={{color:RISK_COLORS[h.risk_tier_worst]||color}}>{h.risk_tier_worst}</td>
            </tr>
          );
        })}</tbody>
      </table>
    </div>
  );
}

// ── AttentionHeatmap ────────────────────────────────────
function AttentionHeatmap({horizons}){
  const heatData=useMemo(()=>{
    if(!horizons||!horizons[0]?.attention_weights)return[];
    const w=horizons[0].attention_weights;
    // Downsample 1440 → 24 hours
    const hourly=[];
    const step=Math.max(1,Math.floor(w.length/24));
    for(let i=0;i<24;i++){
      const start=i*step;
      const end=Math.min(start+step,w.length);
      const slice=w.slice(start,end);
      const avg=slice.length?slice.reduce((a,b)=>a+b,0)/slice.length:0;
      hourly.push({hour:`${i}h`,weight:avg});
    }
    // Normalize
    const mx=Math.max(...hourly.map(h=>h.weight),1e-10);
    hourly.forEach(h=>h.norm=h.weight/mx);
    return hourly;
  },[horizons]);

  if(!heatData.length)return null;

  return(
    <div id="attention-heatmap" className="glass rounded-2xl p-6">
      <h3 className="text-xs font-semibold tracking-widest text-gray-400 mb-4 uppercase">Attention Heatmap — Input Window (24h)</h3>
      <div className="flex gap-1 items-end h-24">
        {heatData.map((d,i)=>{
          const intensity=Math.max(0.08,d.norm);
          const hue=270-d.norm*120; // purple→yellow for high attention
          return(
            <div key={i} className="flex-1 flex flex-col items-center gap-1">
              <div className="w-full rounded-sm transition-all duration-500" style={{
                height:`${intensity*100}%`,
                background:`hsla(${hue},70%,60%,${0.3+intensity*0.7})`,
                minHeight:4
              }} title={`Hour ${i}: ${(d.weight*1000).toFixed(2)}`}/>
              {i%3===0&&<span className="text-[9px] text-gray-600 font-mono">{i}h</span>}
            </div>
          );
        })}
      </div>
      <div className="flex justify-between mt-2">
        <span className="text-[10px] text-gray-600">← 24h ago</span>
        <span className="text-[10px] text-gray-600">Current →</span>
      </div>
    </div>
  );
}

// ── SolarWindMini ───────────────────────────────────────
function SolarWindMini({data}){
  const [sw,setSw]=useState(null);
  useEffect(()=>{
    fetch(API_URL+'/api/solar-wind/latest').then(r=>r.json()).then(d=>{if(d.speed)setSw(d)}).catch(()=>{});
    const iv=setInterval(()=>{fetch(API_URL+'/api/solar-wind/latest').then(r=>r.json()).then(d=>{if(d.speed)setSw(d)}).catch(()=>{})},30000);
    return()=>clearInterval(iv);
  },[]);

  const vals=[
    {label:'Bz',value:sw?.bz_gsm,unit:'nT',warn:v=>v<-10},
    {label:'Speed',value:sw?.speed,unit:'km/s',warn:v=>v>600},
    {label:'Density',value:sw?.density,unit:'p/cm³',warn:v=>v>20},
    {label:'Bt',value:sw?.bt,unit:'nT',warn:v=>v>20},
  ];

  return(
    <div className="glass rounded-2xl p-6">
      <h3 className="text-xs font-semibold tracking-widest text-gray-400 mb-4 uppercase">Live Solar Wind (DSCOVR)</h3>
      <div className="grid grid-cols-4 gap-3">
        {vals.map(({label,value,unit,warn})=>{
          const v=value!=null?parseFloat(value):null;
          const isWarn=v!=null&&warn(v);
          return(
            <div key={label} className="text-center p-3 rounded-lg bg-space-900/50">
              <div className={`text-xl font-mono font-bold ${isWarn?'text-red-400':'text-gray-200'}`}>
                {v!=null?v.toFixed(1):'—'}
              </div>
              <div className="text-[10px] text-gray-500 mt-1">{label} ({unit})</div>
            </div>
          );
        })}
      </div>
      {!sw&&<p className="text-xs text-gray-600 mt-2 text-center">Waiting for NOAA data...</p>}
    </div>
  );
}

// ── TopFeatures ─────────────────────────────────────────
function TopFeatures({gTierProbs,topFeatures}){
  const feats=topFeatures||[
    {name:'min_bz_6hr',shap_value:0.43},
    {name:'max_vsw_12hr',shap_value:0.31},
    {name:'mean_kp_6hr',shap_value:0.21}
  ];
  return(
    <div className="glass rounded-2xl p-6">
      <h3 className="text-xs font-semibold tracking-widest text-gray-400 mb-4 uppercase">Top Driving Features (SHAP)</h3>
      <div className="space-y-3">
        {feats.map((f,i)=>(
          <div key={i}>
            <div className="flex justify-between text-sm mb-1">
              <span className="font-mono text-gray-300">{f.name}</span>
              <span className="font-mono text-purple-400">{f.shap_value?.toFixed(2)}</span>
            </div>
            <div className="h-2 bg-space-900 rounded-full overflow-hidden">
              <div className="h-full rounded-full transition-all duration-700" style={{
                width:`${Math.min(100,f.shap_value*100/0.5)}%`,
                background:`linear-gradient(90deg,#8b5cf6,#a78bfa)`
              }}/>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── App ─────────────────────────────────────────────────
function App(){
  const{data,connected,history}=useWebSocket();
  const horizons=data?.horizons||[];
  const alert=data?.headline_alert||null;
  const gTierProbs=data?.g_tier_probs||null;
  const isStub=data?.is_stub!==false;
  const [clock,setClock]=useState(new Date());

  useEffect(()=>{const t=setInterval(()=>setClock(new Date()),1000);return()=>clearInterval(t)},[]);

  return(
    <div className="min-h-screen bg-space-950">
      <AlertBanner alert={alert} connected={connected} isStub={isStub}/>
      <div className="max-w-7xl mx-auto px-4 py-6">
        {/* Header */}
        <div className="flex items-center justify-between mb-6">
          <div>
            <h1 className="text-3xl font-black tracking-tight">
              <span className="bg-gradient-to-r from-purple-400 via-pink-400 to-amber-400 bg-clip-text text-transparent">ICARUS-X</span>
            </h1>
            <p className="text-sm text-gray-500 mt-1">Space Weather Forecasting & GIC Risk Assessment</p>
          </div>
          <div className="text-right">
            <div className="font-mono text-sm text-gray-400">{clock.toUTCString()}</div>
            <div className="flex items-center gap-2 mt-1 justify-end">
              <div className={`w-2 h-2 rounded-full ${connected?'bg-green-400':'bg-red-400'} animate-pulse`}/>
              <span className="text-xs text-gray-500">{connected?'Connected':'Reconnecting...'}</span>
              {data?.run_timestamp&&<span className="text-xs text-gray-600 font-mono ml-2">Last: {new Date(data.run_timestamp).toLocaleTimeString()}</span>}
            </div>
          </div>
        </div>

        {/* Main Grid */}
        <div className="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-4">
          <div className="lg:col-span-2"><KpChart horizons={horizons} history={history}/></div>
          <GICPanel alert={alert} gTierProbs={gTierProbs}/>
        </div>

        <div className="mb-4"><ForecastTable horizons={horizons}/></div>

        <div className="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-4">
          <div className="lg:col-span-2"><AttentionHeatmap horizons={horizons}/></div>
          <TopFeatures gTierProbs={gTierProbs}/>
        </div>

        <SolarWindMini data={data}/>

        {/* Footer */}
        <div className="mt-8 text-center text-xs text-gray-700 pb-4">
          ICARUS-X v1.0 • Data: NOAA/DSCOVR • Models: BiGRU + XGBoost + Empirical GIC
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
